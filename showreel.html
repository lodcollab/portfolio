<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Showreel — Elodie Hu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gray-client: #D9D9D9;
      --white: #ffffff;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --nav-h: 80px;
      --pad: 48px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════ */
    nav {
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 48px;
    }

    .nav-logo {
      font-family: var(--font);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.02em;
      text-decoration: none;
      color: var(--black);
    }

    .nav-links {
      display: flex;
      gap: 58px;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      color: var(--black);
      text-transform: uppercase;
      position: relative;
      padding-bottom: 2px;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--black);
      transition: width 0.25s ease;
    }
    .nav-links a:hover::after { width: 100%; }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--black);
      transition: all 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--white);
      z-index: 99;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: var(--font);
      font-size: 32px;
      font-weight: 700;
      text-decoration: none;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ══════════════════════════════════════
       LAYOUT SHOWREEL
    ══════════════════════════════════════ */
    .showreel-wrapper {
      padding-top: var(--nav-h);
      padding-left: var(--pad);
      padding-right: var(--pad);
      padding-bottom: 80px;
    }

    .project-divider {
      width: 100%;
      height: 1px;
      background: var(--black);
      margin-bottom: 48px;
    }

    .showreel-center {
      display: flex;
      justify-content: center;
    }

    .showreel-video {
      width: 1185px;
      max-width: 100%;
      aspect-ratio: 1185 / 667;
      background: var(--gray-client);
      overflow: hidden;
    }

    .showreel-video iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ══════════════════════════════════════
       SECTION MORE
    ══════════════════════════════════════ */
    .more-divider {
      height: 1px;
      background: var(--black);
      margin: 0 var(--pad);
    }

    .more-section {
      padding: 48px var(--pad) 80px;
    }

    .more-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .more-card {
      text-decoration: none;
      color: inherit;
      display: block;
      cursor: pointer;
    }

    .more-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--gray-client);
      overflow: hidden;
      position: relative;
    }

    .more-thumb img,
    .more-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.3s ease;
    }

    .more-thumb .hover-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0);
      opacity: 0;
      transition: opacity 0.3s ease, background 0.3s ease;
      z-index: 2;
    }

    .more-thumb .hover-label span {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      text-align: center;
    }

    .more-card:hover .more-thumb img,
    .more-card:hover .more-thumb video { filter: brightness(0.4); }

    .more-card:hover .more-thumb .hover-label {
      opacity: 1;
      background: rgba(0,0,0,0.3);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 24px 32px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .showreel-wrapper { padding-left: 32px; padding-right: 32px; }
      .more-section { padding: 48px 32px 64px; }
      .more-divider { margin: 0 32px; }
      .more-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 540px) {
      nav { padding: 20px; }
      .showreel-wrapper { padding-left: 20px; padding-right: 20px; }
      .more-section { padding: 48px 20px 48px; }
      .more-divider { margin: 0 20px; }
      .more-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- MENU MOBILE -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" onclick="closeMobile()">Works</a>
    <a href="about.html" onclick="closeMobile()">About</a>
  </div>

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="index.html">ELODIE HU</a>
    <ul class="nav-links">
      <li><a href="index.html">Works</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <button class="hamburger" id="hamburger" onclick="toggleMobile()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ══════════════════════════════════════
       SHOWREEL
  ══════════════════════════════════════ -->
  <div class="showreel-wrapper">
    <div class="project-divider"></div>
    <div class="showreel-center">
      <div class="showreel-video">
        <!-- Remplace XXXXXXX par l'ID YouTube de ton showreel -->
        <iframe
          src="https://www.youtube.com/embed/RL-wdHYVy7g"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SECTION MORE — autres projets
  ══════════════════════════════════════ -->
  <div class="more-divider"></div>
  <div class="more-section">
    <div class="more-grid">
      <!-- Remplace avec tes vrais projets -->
      <a class="more-card" href="orsay.html">
        <div class="more-thumb">
          <video autoplay loop muted playsinline>
            <source src="images/orsay-cover.mp4" type="video/mp4" />
          </video>
          <div class="hover-label"><span>Musée d'Orsay</span></div>
        </div>
      </a>

      <a class="more-card" href="sdes.html">
        <div class="more-thumb">
          <video autoplay loop muted playsinline>
            <source src="images/sdes-video-cover.mp4" type="video/mp4" />
          </video>
          <div class="hover-label"><span>Ministère de l'Écologie</span></div>
        </div>
      </a>

      <a class="more-card" href="cdd.html">
        <div class="more-thumb">
          <video autoplay loop muted playsinline>
            <source src="images/cdd-cover.mp4" type="video/mp4" />
          </video>
          <div class="hover-label"><span>Caisse des Dépôts</span></div>
        </div>
      </a>
    </div>
  </div>

  <script>
    function toggleMobile() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }
    function closeMobile() {
      document.getElementById('mobileMenu').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
    }
  </script>

</body>
</html>
