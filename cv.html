<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CV — Elodie Hu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gray-client: #D9D9D9;
      --white: #ffffff;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --nav-h: 80px;
      --pad: 48px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════════════
       NAVBAR — identique aux autres pages
    ══════════════════════════════════════ */
    nav {
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 48px;
    }

    .nav-logo {
      font-family: var(--font);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.02em;
      text-decoration: none;
      color: var(--black);
    }

    .nav-links {
      display: flex;
      gap: 58px;
      list-style: none;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      color: var(--black);
      text-transform: uppercase;
      position: relative;
      padding-bottom: 2px;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: var(--black);
      transition: width 0.25s ease;
    }
    .nav-links a:hover::after { width: 100%; }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--black);
      transition: all 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--white);
      z-index: 99;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 32px;
      font-weight: 700;
      text-decoration: none;
      color: var(--black);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ══════════════════════════════════════
       CV — zone image 1600×1048 centrée
       Marges : 160 gauche/droite · 128 haut/bas (symétriques → centré)
    ══════════════════════════════════════ */
    .cv-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-h) + 24px) 24px 24px;
    }

    .cv-image {
      width: 1004px;
      max-width: 100%;
      aspect-ratio: 1004 / 800;   /* → 1004×800, shrink proportionnel si écran étroit */
      background: var;
      overflow: hidden;
      flex-shrink: 0;
    }

    .cv-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;          /* l'image remplit la zone */
      display: block;
    }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 900px) {
      nav { padding: 24px 32px; }
      .nav-links { display: none; }
      .hamburger { display: flex; }

      .cv-wrapper {
        align-items: flex-start;
        padding: calc(var(--nav-h) + 48px) 32px 64px;
      }
    }

    @media (max-width: 540px) {
      nav { padding: 20px; }
      .cv-wrapper { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>

  <!-- MENU MOBILE -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" onclick="closeMobile()">Works</a>
    <a href="about.html" onclick="closeMobile()">About</a>
  </div>

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="index.html">ELODIE HU</a>
    <ul class="nav-links">
      <li><a href="index.html">Works</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <button class="hamburger" id="hamburger" onclick="toggleMobile()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- CV -->
  <div class="cv-wrapper">
    <div class="cv-image">
      <img src="images/CV.png" alt="CV — Elodie Hu" />
      <!-- ↑ Place ton fichier CV.png dans le dossier images/ -->
    </div>
  </div>

  <script>
    function toggleMobile() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    }
    function closeMobile() {
      document.getElementById('mobileMenu').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
    }
  </script>

</body>
</html>
